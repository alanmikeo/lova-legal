  <style>
    :root {
      --primary: #FF416C;
      --primary-light: #FF6B8A;
      --accent: #FF4B2B;
      --bg: #0D0D0D;
      --bg-card: #1A1A1A;
      --bg-surface: #242424;
      --text: #F0F0F0;
      --text-muted: #888;

      --gradient: linear-gradient(135deg, #FF416C, #FF4B2B);

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.75;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .lang-switcher {
      display: flex;
      gap: 4px;
      background: var(--bg-surface);
      border-radius: 8px;
      padding: 4px;
    }

    .lang-btn {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--gradient);
      color: #fff;
    }

    /* ── Tabs ── */
    .tabs-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }

    .tabs-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      padding: 0 24px;
      gap: 0;
    }

    .tab-btn {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      padding: 14px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--primary-light);
      border-bottom-color: var(--primary);
      font-weight: 500;
    }

    /* ── Main ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .doc-header {
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .doc-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .doc-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 600;
      line-height: 1.15;
      margin-bottom: 12px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .doc-updated {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ── Section ── */
    .section {
      margin-bottom: 40px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .section-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--primary-light);
      padding: 18px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.01em;
    }

    .section-body {
      padding: 24px;
      color: #C8C8C8;
      font-size: 0.92rem;
      line-height: 1.8;
    }

    .section-body p { margin-bottom: 12px; }
    .section-body p:last-child { margin-bottom: 0; }

    .section-body ul {
      padding-left: 20px;
      margin: 8px 0 12px;
    }

    .section-body ul li {
      margin-bottom: 6px;
      color: #B0B0B0;
    }

    .section-body strong {
      color: var(--text);
      font-weight: 500;
    }

    /* ── Table ── */
    .legal-table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 0.85rem;
    }

    .legal-table th {
      background: var(--bg-surface);
      color: var(--primary-light);
      text-align: left;
      padding: 10px 14px;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }

    .legal-table td {
      padding: 10px 14px;
      border-bottom: 1px solid #1E1E1E;
      color: #B0B0B0;
    }

    .legal-table tr:last-child td { border-bottom: none; }

    /* ── Contact block ── */
    .contact-block {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--primary);
      border-radius: 8px;
      padding: 16px 20px;
      margin-top: 12px;
      font-size: 0.88rem;
      color: #B0B0B0;
      line-height: 1.7;
    }

    .contact-block a {
      color: var(--primary-light);
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.78rem;
      background: var(--bg-card);

      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

    /* ── Fade animation ── */
    .fade-in { animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

      .header-inner { height: 56px; }
      .logo { font-size: 1.3rem; }
      main { padding: 32px 16px 60px; }
      .section-body { padding: 16px; }
    }
  </style>
</head>

  /* ── Render ── */
  function render() {
    const lang = content[currentLang];
    const doc  = lang[currentDoc];

    // Tabs
    document.getElementById('tab-privacy-label').textContent = lang.tabs.privacy;
    document.getElementById('tab-terms-label').textContent   = lang.tabs.terms;
    document.getElementById('footer-dev').textContent        = lang.footerDev;

    // Active tab style
    document.getElementById('tab-privacy').className = 'tab-btn' + (currentDoc === 'privacy' ? ' active' : '');
    document.getElementById('tab-terms').className   = 'tab-btn' + (currentDoc === 'terms'   ? ' active' : '');

    // Lang buttons
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.className = 'lang-btn' + (b.textContent.toLowerCase() === currentLang ? ' active' : '');
    });

    // HTML lang attribute
    document.documentElement.lang = currentLang;

    // Content
    const sectionsHtml = doc.sections.map(s =>
      `<div class="section">
        <div class="section-title">${s.title}</div>
        <div class="section-body">${s.body}</div>
      </div>`
    ).join('');

    document.getElementById('main-content').innerHTML =
      `<div class="doc-header fade-in">
        <div class="doc-label">${doc.label}</div>
        <h1 class="doc-title">${doc.title}</h1>
        <p class="doc-updated">${doc.updated}</p>
      </div>
      <div class="fade-in">${sectionsHtml}</div>`;
  }

  function setLang(lang) {
    currentLang = lang;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function setDoc(doc) {
    currentDoc = doc;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Detect browser language on first load
  const browserLang = navigator.language.slice(0, 2);
  if (['pt', 'en', 'es'].includes(browserLang)) currentLang = browserLang;

  render();
</script>
